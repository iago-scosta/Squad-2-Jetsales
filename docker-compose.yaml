version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: jetsales_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jetsales
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jetsales"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./server
    container_name: jetsales_backend
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server/.env.docker
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  postgres_data:
